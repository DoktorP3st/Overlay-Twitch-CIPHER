<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SIGNAL Chat — Test Local</title>
<style>
/* ══ TEST PANEL ══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #06050f;
  --panel:  #0c0a1a;
  --border: #1c1830;
  --accent: #7c5cbf;
  --text:   #b0acd0;
  --dim:    #4a4668;
}
html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; overflow: hidden; }

/* Aperçu */
#preview {
  flex: 1; display: flex; flex-direction: column;
  background: radial-gradient(ellipse 55% 45% at 15% 85%, rgba(124,92,191,0.09) 0%, transparent 65%),
              linear-gradient(150deg, #0d0c1e 0%, #060510 100%);
  border-right: 1px solid var(--border);
}
.preview-bar {
  padding: 11px 16px; font-size: 10.5px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--dim); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.preview-bar-left { display: flex; align-items: center; gap: 8px; }
.preview-bar-left::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: #2ecc71; box-shadow: 0 0 6px #2ecc71; animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
.obs-tag { font-size: 10px; letter-spacing: 1px; border: 1px solid var(--border); padding: 2px 7px; border-radius: 3px; }

/* Zone widget — le #chat-wrap se positionne en absolute dedans */
#widget-area {
  flex: 1;
  position: relative;
  overflow: hidden;
}

/* ══ WIDGET STYLES (= CSS.css) ═══════════════════════════ */
#widget-area {
  --card-bg:    rgba(6, 4, 16, 0.92);
  --text-widget: #c0bcd8;
  --width:      400px;
  --font-size:  14px;
  --uname-size: 12px;
  --spacing:    7px;
  --anim-in:    380ms;
  --radius:     4px;
}
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600;700&display=swap');

#chat-wrap {
  position: absolute;
  bottom: 20px;
  left: 20px;
  width: var(--width);
}
#chat-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: var(--spacing);
}
.chat-msg {
  opacity: 0;
  transform: translateX(-18px);
  transition: opacity var(--anim-in) ease, transform var(--anim-in) cubic-bezier(0.16, 1, 0.3, 1);
}
.chat-msg.visible { opacity: 1; transform: none; }
.chat-msg.leaving {
  opacity: 0 !important; transform: translateX(-14px) !important;
  transition: opacity 0.42s ease, transform 0.42s ease !important;
  pointer-events: none;
}
.msg-inner {
  position: relative;
  background: var(--card-bg);
  border-radius: var(--radius);
  border-left: 2px solid var(--uc, #7c5cbf);
  padding: 9px 13px 10px 12px;
  overflow: hidden;
  box-shadow: 0 2px 16px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.04);
}
.msg-inner::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(110deg, var(--uc, #7c5cbf) 0%, transparent 50%);
  opacity: .06; pointer-events: none;
}
.scan-line {
  position: absolute; left: 0; right: 0; top: 0; height: 1.5px;
  background: linear-gradient(to right, transparent, var(--uc, #7c5cbf), rgba(255,255,255,.7), var(--uc, #7c5cbf), transparent);
  pointer-events: none;
  animation: scanDown .45s ease forwards;
  z-index: 20;
}
@keyframes scanDown { 0%{top:0%;opacity:1} 80%{opacity:.6} 100%{top:100%;opacity:0} }
.corner {
  position: absolute; width: 9px; height: 9px;
  opacity: 0; transition: opacity .35s .2s; z-index: 5;
}
.chat-msg.visible .corner { opacity: .55; }
.corner.tl { top:0;    left:0;  border-top:    1.5px solid var(--uc,#7c5cbf); border-left:  1.5px solid var(--uc,#7c5cbf); }
.corner.tr { top:0;    right:0; border-top:    1.5px solid var(--uc,#7c5cbf); border-right: 1.5px solid var(--uc,#7c5cbf); }
.corner.bl { bottom:0; left:0;  border-bottom: 1.5px solid var(--uc,#7c5cbf); border-left:  1.5px solid var(--uc,#7c5cbf); }
.corner.br { bottom:0; right:0; border-bottom: 1.5px solid var(--uc,#7c5cbf); border-right: 1.5px solid var(--uc,#7c5cbf); }
.msg-header { position: relative; z-index: 2; display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.sig-bars { display: flex; align-items: flex-end; gap: 2px; height: 11px; flex-shrink: 0; }
.sig-bars span { display: block; width: 3px; background: var(--uc,#7c5cbf); border-radius: 1px; opacity: 0; animation: barFill .7s ease forwards; }
.sig-bars span:nth-child(1) { height: 4px;  animation-delay: .08s; }
.sig-bars span:nth-child(2) { height: 7px;  animation-delay: .20s; }
.sig-bars span:nth-child(3) { height: 11px; animation-delay: .32s; }
@keyframes barFill { 0%{opacity:0;transform:scaleY(0)} 60%{opacity:1;transform:scaleY(1);box-shadow:0 0 5px var(--uc,#7c5cbf)} 100%{opacity:.45;transform:scaleY(1);box-shadow:none} }
.msg-badges { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
.msg-badges img { width: 16px; height: 16px; vertical-align: middle; }
.msg-username {
  font-family: 'Share Tech Mono', monospace;
  font-size: var(--uname-size);
  color: var(--uc,#7c5cbf);
  text-shadow: 0 0 7px var(--uc,#7c5cbf), 0 0 18px var(--uc,#7c5cbf);
  letter-spacing: .04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.msg-timestamp { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: rgba(255,255,255,.2); margin-left: auto; flex-shrink: 0; }
.msg-sep { position: relative; z-index: 2; height: 1px; margin-bottom: 5px; background: linear-gradient(to right, var(--uc,#7c5cbf), rgba(255,255,255,.12), transparent); opacity: .35; }
.msg-body { position: relative; z-index: 2; font-family: 'Inter', sans-serif; font-size: var(--font-size); color: var(--text-widget); line-height: 1.55; word-break: break-word; }
.msg-body img { height: 22px; width: auto; vertical-align: middle; margin: 0 2px; }
.msg-body .mention { background: rgba(124,92,191,.22); color: #b89bff; border-radius: 3px; padding: 0 4px; font-weight: 600; }
.chat-msg.is-mod  { --uc: #0be8a8; }
.chat-msg.is-vip  { --uc: #ee5a24; }
.chat-msg.is-broadcaster { --uc: #ff3838; }
@keyframes mentionGlitch {
  0%,100%{transform:none;filter:none}
  10%{transform:translateX(-3px);filter:hue-rotate(90deg) brightness(1.5)}
  20%{transform:translateX(3px);filter:hue-rotate(-90deg)}
  30%{transform:translateX(-2px);filter:none}
  40%{transform:translateX(2px);filter:brightness(1.3)}
  50%{transform:none}
}
#chat-wrap.mention-flash { animation: mentionGlitch .6s ease forwards; }

/* ══ PANNEAU CONTRÔLE ════════════════════════════════════ */
#panel { width: 300px; display: flex; flex-direction: column; background: var(--panel); overflow-y: auto; }
.section { padding: 14px 14px; border-bottom: 1px solid var(--border); }
.stitle { font-size: 10px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; color: var(--dim); margin-bottom: 10px; }
.stats { display: flex; gap: 12px; font-size: 11px; color: var(--dim); padding: 10px 14px; border-bottom: 1px solid var(--border); }
.sv { color: var(--text); font-weight: 700; }
.users { display: flex; flex-direction: column; gap: 5px; }
.ubtn {
  display: flex; align-items: center; gap: 8px; padding: 7px 10px;
  border-radius: 5px; border: 1px solid var(--border); background: rgba(255,255,255,.02);
  cursor: pointer; color: var(--text); font-size: 12.5px; font-family: inherit;
  transition: background .13s, border-color .13s;
}
.ubtn:hover { background: rgba(255,255,255,.05); border-color: var(--col); }
.udot { width: 7px; height: 7px; border-radius: 50%; background: var(--col); box-shadow: 0 0 5px var(--col); flex-shrink: 0; }
.uname { font-weight: 600; color: var(--col); flex: 1; font-size: 12px; }
.ucnt { font-size: 10px; color: var(--dim); }
.custom { display: flex; flex-direction: column; gap: 6px; }
select, textarea { background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 5px; padding: 7px 9px; color: var(--text); font-family: inherit; font-size: 12.5px; outline: none; transition: border-color .15s; }
select:focus, textarea:focus { border-color: var(--accent); }
select option { background: #0c0a1a; }
textarea { resize: none; height: 60px; line-height: 1.5; }
textarea::placeholder { color: var(--dim); }
.btn-send { padding: 8px; border-radius: 5px; border: none; background: var(--accent); color: #fff; font-family: inherit; font-size: 12.5px; font-weight: 600; cursor: pointer; transition: filter .13s, transform .1s; }
.btn-send:hover { filter: brightness(1.15); }
.btn-send:active { transform: scale(.97); }
.presets { display: flex; flex-wrap: wrap; gap: 4px; }
.preset { padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); background: rgba(255,255,255,.02); color: var(--text); font-size: 11px; cursor: pointer; font-family: inherit; transition: background .12s, border-color .12s; white-space: nowrap; }
.preset:hover { background: rgba(124,92,191,.14); border-color: var(--accent); }
.auto-row { display: flex; align-items: center; gap: 9px; }
.toggle { position: relative; width: 34px; height: 18px; flex-shrink: 0; }
.toggle input { display: none; }
.track { position: absolute; inset: 0; border-radius: 20px; background: var(--border); cursor: pointer; transition: background .2s; }
.toggle input:checked + .track { background: var(--accent); }
.track::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: #fff; transition: transform .2s; }
.toggle input:checked + .track::after { transform: translateX(16px); }
.tlabel { font-size: 12px; }
.speed { width: 52px; background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 4px; padding: 5px 7px; color: var(--text); font-family: inherit; font-size: 11.5px; outline: none; text-align: center; }
.slabel { font-size: 10.5px; color: var(--dim); }
.btn-clear { width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #3a1212; background: rgba(255,50,50,.05); color: #ff6b6b; font-family: inherit; font-size: 12px; cursor: pointer; transition: background .13s; }
.btn-clear:hover { background: rgba(255,50,50,.12); }
</style>
</head>
<body>

<!-- ══ APERÇU ══ -->
<div id="preview">
  <div class="preview-bar">
    <span class="preview-bar-left">Aperçu — SIGNAL Chat</span>
    <span class="obs-tag">Local</span>
  </div>
  <div id="widget-area">
    <!-- HTML.html -->
    <div id="chat-wrap">
      <ul id="chat-list"></ul>
    </div>
  </div>
</div>

<!-- ══ PANNEAU ══ -->
<div id="panel">
  <div class="stats">
    <span>Envoyés : <span class="sv" id="sCnt">0</span></span>
    <span>Session : <span class="sv" id="sTime">00:00</span></span>
  </div>

  <div class="section">
    <div class="stitle">Utilisateurs rapides</div>
    <div class="users" id="usersGrid"></div>
  </div>

  <div class="section">
    <div class="stitle">Message personnalisé</div>
    <div class="custom">
      <select id="selUser"></select>
      <textarea id="txtMsg" placeholder="Tape un message… (Entrée = envoyer)"></textarea>
      <button class="btn-send" id="btnSend">Envoyer</button>
    </div>
  </div>

  <div class="section">
    <div class="stitle">Messages rapides</div>
    <div class="presets" id="presetsGrid"></div>
  </div>

  <div class="section">
    <div class="stitle">Spam automatique</div>
    <div class="auto-row">
      <label class="toggle"><input type="checkbox" id="autoTog"><div class="track"></div></label>
      <span class="tlabel">Activer</span>
      <input class="speed" type="number" id="autoSpd" value="2.5" min="0.5" max="15" step="0.5">
      <span class="slabel">sec</span>
    </div>
  </div>

  <div class="section">
    <button class="btn-clear" id="btnClear">Effacer tous les messages</button>
  </div>
</div>

<!-- ══ JS WIDGET (= JS.js) ══ -->
<script>
'use strict';

/* fieldData initialisé avec les valeurs par défaut */
let fieldData = {
  chatWidth: 400, fontSize: 14, usernameFontSize: 12,
  msgSpacing: 7, animIn: 380, radius: 4, lifetime: 0,
  maxMessages: 8, showTimestamp: false, showBadges: true,
  cardColor: '#06040f', cardOpacity: 92, textColor: '#c0bcd8',
  hideBots: true, hideCommands: false, minLen: 1,
  mentionAliases: 'DoktorP3st,Paglorieux',
};

let msgCount = 0;
const BOTS    = new Set(['streamelements','nightbot','moobot','fossabot','streamlabs','wizebot','commanderroot','botrixoficial']);
const PALETTE = ['#ff6b6b','#ff9f43','#ffd32a','#0be881','#00d2d3','#54a0ff','#c56cf0','#fd79a8','#26de81','#4ecdc4','#a29bfe','#ee5a24'];
const colorCache = {};

const list = document.getElementById('chat-list');
const wrap = document.getElementById('chat-wrap');

const fd  = k => fieldData[k];
const now = () => { const d = new Date(); return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); };

function userColor(name, raw) {
  if (raw && raw !== '' && raw !== '#000000' && raw !== '#000') return raw;
  if (!colorCache[name]) colorCache[name] = PALETTE[[...name].reduce((a,c) => a + c.charCodeAt(0), 0) % PALETTE.length];
  return colorCache[name];
}

function safeText(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/@(\w+)/g,'<span class="mention">@$1</span>');
}

function hexToRgb(hex) {
  if (!hex || hex.length < 7) return '6,4,16';
  return parseInt(hex.slice(1,3),16) + ',' + parseInt(hex.slice(3,5),16) + ',' + parseInt(hex.slice(5,7),16);
}

function applyTheme() {
  const A = document.getElementById('widget-area');
  A.style.setProperty('--width',       (fd('chatWidth')        || 400) + 'px');
  A.style.setProperty('--font-size',   (fd('fontSize')         || 14)  + 'px');
  A.style.setProperty('--uname-size',  (fd('usernameFontSize') || 12)  + 'px');
  A.style.setProperty('--spacing',     (fd('msgSpacing')       || 7)   + 'px');
  A.style.setProperty('--anim-in',     (fd('animIn')           || 380) + 'ms');
  A.style.setProperty('--radius',      (fd('radius')           || 4)   + 'px');
  A.style.setProperty('--text-widget',  fd('textColor')        || '#c0bcd8');
  const bgOp = (parseInt(fd('cardOpacity')) || 92) / 100;
  A.style.setProperty('--card-bg', 'rgba(' + hexToRgb(fd('cardColor') || '#06040f') + ',' + bgOp + ')');
}

function checkMention(text) {
  const aliases = (fd('mentionAliases') || 'DoktorP3st,Paglorieux')
    .split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
  if (!aliases.some(a => (text||'').toLowerCase().includes(a))) return;
  wrap.classList.remove('mention-flash');
  void wrap.offsetWidth;
  wrap.classList.add('mention-flash');
  setTimeout(() => wrap.classList.remove('mention-flash'), 700);
}

function addMessage(data) {
  if (fd('hideCommands') && (data.text||'').startsWith('!')) return;
  if (fd('hideBots') && BOTS.has((data.displayName||'').toLowerCase())) return;
  if ((data.text||'').trim().length < (parseInt(fd('minLen'))||1)) return;

  const uc = userColor(data.displayName || 'anon', data.displayColor || '');

  const li = document.createElement('li');
  li.className   = 'chat-msg';
  li.dataset.id  = 'msg-' + (++msgCount);
  li.dataset.uid = (data.displayName || '').toLowerCase();
  li.dataset.mid = data.msgId || '';
  li.style.setProperty('--uc', uc);

  const bt = (data.badges || []).map(b => (b.type || b.t || '').toLowerCase());
  if (bt.includes('broadcaster'))  li.classList.add('is-broadcaster');
  else if (bt.includes('moderator'))li.classList.add('is-mod');
  else if (bt.includes('vip'))      li.classList.add('is-vip');
  else if (bt.includes('subscriber'))li.classList.add('is-sub');

  li.innerHTML =
    '<div class="msg-inner">' +
      '<div class="corner tl"></div><div class="corner tr"></div>' +
      '<div class="corner bl"></div><div class="corner br"></div>' +
      '<div class="scan-line"></div>' +
      '<div class="msg-header">' +
        '<div class="sig-bars"><span></span><span></span><span></span></div>' +
        '<span class="msg-badges"></span>' +
        '<span class="msg-username"></span>' +
        '<span class="msg-timestamp"></span>' +
      '</div>' +
      '<div class="msg-sep"></div>' +
      '<div class="msg-body"></div>' +
    '</div>';

  li.querySelector('.msg-username').textContent = data.displayName || 'Anonyme';
  const tsEl = li.querySelector('.msg-timestamp');
  if (fd('showTimestamp')) { tsEl.textContent = now(); } else { tsEl.style.display = 'none'; }

  if (fd('showBadges') !== false && Array.isArray(data.badges)) {
    data.badges.forEach(b => {
      if (b.url) { const img = document.createElement('img'); img.src = b.url; img.alt = b.type||''; li.querySelector('.msg-badges').appendChild(img); }
    });
  }

  li.querySelector('.msg-body').innerHTML = data.renderedText || safeText(data.text || '');
  list.appendChild(li);

  requestAnimationFrame(() => requestAnimationFrame(() => li.classList.add('visible')));
  setTimeout(() => { try { li.querySelector('.scan-line')?.remove(); } catch(e){} }, 550);

  const all = list.querySelectorAll('.chat-msg');
  if (all.length > (parseInt(fd('maxMessages')) || 8)) removeMsg(all[0]);

  const life = parseInt(fd('lifetime')) || 0;
  if (life > 0) setTimeout(() => removeMsg(li), life * 1000);

  checkMention(data.text || '');
}

function removeMsg(el) {
  if (!el || el.classList.contains('leaving')) return;
  el.classList.add('leaving');
  setTimeout(() => { try { el.remove(); } catch(e){} }, 500);
}

// Appliquer le thème au chargement
applyTheme();
</script>

<!-- ══ JS TEST PANEL ══ -->
<script>
const USERS = [
  { name: 'DoktorP3st',   color: '#c56cf0' },
  { name: 'SoldatAlpha',  color: '#54a0ff' },
  { name: 'NightRaven_',  color: '#ff6b6b' },
  { name: 'XxShadow99',   color: '#ffd32a' },
  { name: 'CryptoMike42', color: '#0be881' },
  { name: 'TwitchMod',    color: '#ff9f43' },
];
const PRESETS = [
  'PogChamp !!','GG ez clap','LUL LUL LUL','T\'es un dieu !','OMEGALUL',
  'C\'est quoi ce jeu ?','Frere comment t\'as fait ca','Clip ca vite !',
  'Montre les parametres','Quand le prochain stream ?','La musique est feu',
  'Bonsoir tout le monde !','Premier depuis 2h LUL','Let\'s go !!',
];
const AUTO_MSGS = [
  'On est combien la ?','PogChamp le skill','Clip ca vite !','Wtf comment',
  'GG WP','LUL','C\'est chaud','Let\'s go !!','GGEZ','T\'es incroyable',
  'PauseChamp','Resurrection xD','OMEGALUL','La musique est feu',
];

let total = 0, startTime = Date.now(), autoTimer = null;
const counts = {};

function sendMsg(user, color, text) {
  addMessage({ displayName: user, displayColor: color, text, badges: [], msgId: 'test-' + Date.now() });
  total++;
  counts[user] = (counts[user] || 0) + 1;
  document.getElementById('sCnt').textContent = total;
  const c = document.querySelector('[data-user="' + user + '"] .ucnt');
  if (c) c.textContent = counts[user];
}

function randomMsg() { return AUTO_MSGS[Math.floor(Math.random() * AUTO_MSGS.length)]; }

// Grille utilisateurs
const grid = document.getElementById('usersGrid');
const sel  = document.getElementById('selUser');
USERS.forEach(u => {
  counts[u.name] = 0;
  const btn = document.createElement('button');
  btn.className = 'ubtn'; btn.dataset.user = u.name;
  btn.style.setProperty('--col', u.color);
  btn.innerHTML = '<span class="udot"></span><span class="uname">' + u.name + '</span><span class="ucnt">0</span>';
  btn.addEventListener('click', () => sendMsg(u.name, u.color, randomMsg()));
  grid.appendChild(btn);
  const opt = document.createElement('option');
  opt.value = u.name; opt.textContent = u.name;
  sel.appendChild(opt);
});

// Presets
const pg = document.getElementById('presetsGrid');
PRESETS.forEach(p => {
  const b = document.createElement('button'); b.className = 'preset'; b.textContent = p;
  b.addEventListener('click', () => document.getElementById('txtMsg').value = p);
  pg.appendChild(b);
});

// Envoyer
function doSend() {
  const text = document.getElementById('txtMsg').value.trim(); if (!text) return;
  const u = USERS.find(u => u.name === sel.value);
  sendMsg(sel.value, u?.color || '#7c5cbf', text);
  document.getElementById('txtMsg').value = '';
}
document.getElementById('btnSend').addEventListener('click', doSend);
document.getElementById('txtMsg').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); } });

// Auto spam
document.getElementById('autoTog').addEventListener('change', function() { this.checked ? startAuto() : stopAuto(); });
document.getElementById('autoSpd').addEventListener('change', () => { if (document.getElementById('autoTog').checked) { stopAuto(); startAuto(); } });
function startAuto() { const s = parseFloat(document.getElementById('autoSpd').value) || 2.5; autoTimer = setInterval(() => { const u = USERS[Math.floor(Math.random()*USERS.length)]; sendMsg(u.name, u.color, randomMsg()); }, s * 1000); }
function stopAuto()  { clearInterval(autoTimer); autoTimer = null; }

// Clear
document.getElementById('btnClear').addEventListener('click', () => { list.querySelectorAll('.chat-msg').forEach(el => removeMsg(el)); });

// Timer
setInterval(() => {
  const s = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('sTime').textContent = String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}, 1000);
